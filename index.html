<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 CGPA Calculator & What-If Simulator | HackWeek 2026</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient Background Gradients -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="app-container">
        <!-- Sidebar / Header Area -->
        <header class="app-header">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div>
                    <h1>Academia Pro</h1>
                    <p class="subtitle">CGPA Calculator & What-If Simulator</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="import-btn" class="btn btn-secondary" title="Import Data">
                    <i class="fa-solid fa-file-import"></i> <span>Import</span>
                </button>
                <button id="export-btn" class="btn btn-secondary" title="Export Data">
                    <i class="fa-solid fa-file-export"></i> <span>Export</span>
                </button>
                <button id="reset-btn" class="btn btn-danger-outline" title="Reset All">
                    <i class="fa-solid fa-trash-can"></i> <span>Reset</span>
                </button>
            </div>
        </header>

        <!-- Main Dashboard Layout -->
        <main class="dashboard-grid">
            <!-- Left Side: Calculation & Semesters Input -->
            <section class="dashboard-card main-panel">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-book-open"></i> Academic Semesters</h2>
                    <button id="add-semester-btn" class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> Add Semester
                    </button>
                </div>

                <div id="semesters-container" class="semesters-list">
                    <!-- Dynamic Semesters loaded here -->
                </div>
            </section>

            <!-- Right Side: Stats & Projections -->
            <section class="sidebar-panel">
                <!-- Summary Card -->
                <div class="dashboard-card summary-card">
                    <h3>Overall Performance</h3>
                    <div class="cgpa-gauge-container">
                        <div class="cgpa-gauge">
                            <svg class="gauge-svg" viewBox="0 0 120 120">
                                <circle class="gauge-bg" cx="60" cy="60" r="54"></circle>
                                <circle id="gauge-progress" class="gauge-value" cx="60" cy="60" r="54"></circle>
                            </svg>
                            <div class="gauge-text">
                                <span id="display-cgpa" class="cgpa-number">0.00</span>
                                <span class="cgpa-label">CGPA</span>
                            </div>
                        </div>
                    </div>

                    <div class="stats-row">
                        <div class="stat-box">
                            <span class="stat-title">Total Credits</span>
                            <span id="display-credits" class="stat-value">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-title">Semesters</span>
                            <span id="display-semesters-count" class="stat-value">0</span>
                        </div>
                    </div>
                </div>

                <!-- What-If Simulator Card -->
                <div class="dashboard-card what-if-card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-wand-magic-sparkles"></i> What-If Simulator</h3>
                        <label class="switch">
                            <input type="checkbox" id="what-if-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <p class="description">Project your future CGPA by simulating upcoming semesters without changing your completed records.</p>
                    
                    <div id="what-if-controls" class="what-if-controls disabled">
                        <div class="simulation-inputs">
                            <div class="input-group">
                                <label for="target-cgpa">Target CGPA Goal</label>
                                <div class="input-wrapper">
                                    <input type="number" id="target-cgpa" min="0" max="10" step="0.01" placeholder="e.g. 8.50">
                                    <i class="fa-solid fa-bullseye"></i>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="future-credits">Future Credits to Take</label>
                                <div class="input-wrapper">
                                    <input type="number" id="future-credits" min="1" step="1" placeholder="e.g. 24">
                                    <i class="fa-solid fa-clock"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div id="what-if-results" class="what-if-results hidden">
                            <!-- Simulated Results Output -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
